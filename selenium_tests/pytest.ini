[pytest]
# Romyntra Selenium Test Configuration
testpaths     = .
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Slower, human-readable output
addopts =
    -v
    --tb=short
    --html=reports/test_report.html
    --self-contained-html

# Markers
markers =
    smoke:    Quick smoke tests (subset of full suite)
    auth:     Authentication tests
    ui:       UI element / visual tests
    api:      Backend API tests
    nav:      Navigation / routing tests
