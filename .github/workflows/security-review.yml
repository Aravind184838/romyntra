name: 🔒 Security Review – DevSecOps Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPORTS_DIR: "Vulnerability Test Results"

permissions:
  contents: read
  security-events: write   # required for SARIF upload to GitHub Security tab

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Detect Technology Stack
  # ────────────────────────────────────────────────────────────────────────────
  detect-stack:
    name: "🔍 Detect Technology Stack"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Detect Frontend & Backend Frameworks
        run: |
          echo "────────────────────────────────────────"
          echo "  🔍 ROMYNTRA TECHNOLOGY STACK ANALYSIS"
          echo "────────────────────────────────────────"
          if [ -f "frontend/vite.config.js" ]; then
            echo "  ✅ Frontend    : React + Vite"
            VITE_VER=$(node -e "console.log(require('./frontend/package.json').devDependencies.vite)" 2>/dev/null || echo "unknown")
            echo "  ✅ Vite        : $VITE_VER"
          fi
          REACT_VER=$(node -e "console.log(require('./frontend/package.json').dependencies.react)" 2>/dev/null || echo "unknown")
          echo "  ✅ React       : $REACT_VER"
          if [ -f "backend/server.js" ]; then
            echo "  ✅ Backend     : Node.js / Express"
          fi
          echo "  ✅ SAST        : Semgrep"
          echo "  ✅ Dependency  : Trivy"
          echo "────────────────────────────────────────"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Secret Detection with Gitleaks
  # ────────────────────────────────────────────────────────────────────────────
  secret-detection:
    name: "🔑 Secret Detection - Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (JSON output for report)
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          docker run --rm \
            -v ${{ github.workspace }}:/path \
            zricethezav/gitleaks:latest detect \
            --source=/path \
            --report-format=json \
            --report-path=/path/"${{ env.REPORTS_DIR }}"/gitleaks-results.json \
            --no-git \
            || true

      - name: Upload Gitleaks JSON Result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-json
          path: "${{ env.REPORTS_DIR }}/gitleaks-results.json"
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — SAST with Semgrep
  # ────────────────────────────────────────────────────────────────────────────
  sast-semgrep:
    name: "🔍 SAST - Semgrep"
    runs-on: ubuntu-latest
    needs: detect-stack
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep SAST Scan
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"
          semgrep scan \
            --config auto \
            --config .semgrep.yml \
            --json \
            --output "${{ env.REPORTS_DIR }}/semgrep-results.json" \
            --exclude "node_modules" \
            --exclude ".git" \
            --exclude "frontend/dist" \
            backend/ frontend/src/ \
            || true

      - name: Run Semgrep (SARIF for GitHub Security tab)
        run: |
          semgrep scan \
            --config auto \
            --config .semgrep.yml \
            --sarif \
            --output "${{ env.REPORTS_DIR }}/semgrep.sarif" \
            --exclude "node_modules" \
            --exclude ".git" \
            --exclude "frontend/dist" \
            backend/ frontend/src/ \
            || true

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "${{ env.REPORTS_DIR }}/semgrep.sarif"
          category: semgrep

      - name: Upload Semgrep JSON Result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-json
          path: "${{ env.REPORTS_DIR }}/semgrep-results.json"
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Dependency Scan with Trivy
  # ────────────────────────────────────────────────────────────────────────────
  dependency-scan:
    name: "📦 Dependency Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: detect-stack
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "trivy-results.json"
          exit-code: "0"
          ignore-unfixed: false
          vuln-type: "library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"

      - name: Run Trivy Filesystem Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy.sarif"
          exit-code: "0"
          ignore-unfixed: false
          vuln-type: "library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Upload Trivy JSON Result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-json
          path: trivy-results.json
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Generate All Reports & Enforce Gate
  # ────────────────────────────────────────────────────────────────────────────
  generate-reports:
    name: "📄 Generate Security Reports"
    runs-on: ubuntu-latest
    needs: [sast-semgrep, dependency-scan, secret-detection]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Report Dependencies
        run: python -m pip install pandas openpyxl

      - name: Create Reports Directory Structure
        run: |
          mkdir -p "${{ env.REPORTS_DIR }}"

      - name: Download Semgrep Results
        uses: actions/download-artifact@v4
        with:
          name: semgrep-json
          path: "${{ env.REPORTS_DIR }}"
        continue-on-error: true

      - name: Download Trivy Results
        uses: actions/download-artifact@v4
        with:
          name: trivy-json
          path: "${{ env.REPORTS_DIR }}"
        continue-on-error: true

      - name: Download Gitleaks Results
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-json
          path: "${{ env.REPORTS_DIR }}"
        continue-on-error: true

      - name: Generate Security Reports
        run: |
          python scripts/generate_security_reports.py \
            --semgrep "${{ env.REPORTS_DIR }}/semgrep-results.json" \
            --trivy   "${{ env.REPORTS_DIR }}/trivy-results.json" \
            --gitleaks "${{ env.REPORTS_DIR }}/gitleaks-results.json" \
            --output  "${{ env.REPORTS_DIR }}" \
            --repo    "${{ github.repository }}" \
            --branch  "${{ github.ref_name }}" \
            --commit  "${{ github.sha }}"

      - name: Upload All Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: "${{ env.REPORTS_DIR }}/"
          retention-days: 30

      - name: Publish GitHub Actions Step Summary
        if: always()
        run: |
          if [ -f "${{ env.REPORTS_DIR }}/summary.md" ]; then
            cat "${{ env.REPORTS_DIR }}/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Security Summary not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run Security Gate Check
        run: |
          python scripts/security_gate.py --reports "${{ env.REPORTS_DIR }}"
