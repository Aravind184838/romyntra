name: Deploy Test Report to GitHub Pages

on:
  push:
    branches: [ main ]

# Need these permissions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm install
      
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm install

    - name: Start backend server
      working-directory: ./backend
      env:
        MONGO_URI: mongodb://localhost:27017/romyntra_test
        JWT_SECRET: test_jwt_secret
      run: |
        npm start &
        npx wait-on http://localhost:5000/api/health

    - name: Start frontend server
      working-directory: ./frontend
      run: |
        npm run dev -- --host 127.0.0.1 &
        npx wait-on http://127.0.0.1:5173

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Python dependencies
      working-directory: ./selenium_tests
      run: |
        python -m pip install --upgrade pip
        pip install pytest selenium webdriver-manager pytest-html pytest-metadata
        
    - name: Run Selenium Tests
      working-directory: ./selenium_tests
      env:
        CI: true
      # Notice we generate it as index.html so it serves cleanly on GitHub pages
      run: |
        mkdir -p gh-pages
        pytest -v --html=gh-pages/index.html
        
    - name: Setup Pages
      if: always()
      uses: actions/configure-pages@v5

    - name: Upload artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: './selenium_tests/gh-pages'

    - name: Deploy to GitHub Pages
      if: always()
      id: deployment
      uses: actions/deploy-pages@v4
