[pytest]
# Romyntra Appium E2E Test Configuration
testpaths     = .
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    -p no:warnings

markers =
    smoke:  Quick smoke tests
    auth:   Authentication tests
    ui:     UI element / visual tests
    api:    Backend API tests
    nav:    Navigation / routing tests
